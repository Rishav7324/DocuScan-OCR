name: Android Release APK & Version Release CI/CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual trigger from Actions tab

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a GitHub Release
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Release APK
        run: gradle :app:assembleRelease

      - name: Build Debug-Signed APK for Testing
        run: gradle :app:assembleDebug

      - name: Prepare Release Artifacts
        run: |
          mkdir -p release-artifacts
          # Copy the debug-signed APK (renamed beautifully for testing)
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk release-artifacts/DocuScan_${{ github.ref_name }}_Debug.apk
          fi
          # Copy the release APK (unsigned)
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk release-artifacts/DocuScan_${{ github.ref_name }}_Release_Unsigned.apk
          elif [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk release-artifacts/DocuScan_${{ github.ref_name }}_Release.apk
          fi

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "DocuScan OCR Sandbox Release ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            release-artifacts/*.apk
          body: |
            # 🚀 DocuScan OCR Sandbox Release - ${{ github.ref_name }}
            
            An offline-first, high-performance, and compliant document scanning engine with adaptive boundary scanning and dual-cloud capabilities.
            
            ---
            
            ## ✨ Implemented Features in This Version
            
            ### 🪄 1. Advanced Adaptive Auto Corner Detection
            *   **Heuristic Boundary Scanner**: Scans high-resolution image diagonals automatically to detect document edges.
            *   **One-Tap Dynamic Adjustment**: Manual "Auto Detect" override option within the perspective correction screen.
            *   **Smooth Warp Transformation**: Projects cropped dimensions onto a normalized, flat, and sharp canvas.
            
            ### 🎨 2. Multiple Custom Aesthetic Themes
            *   **💡 Light Slate**: Minimalist, high-contrast crisp theme for well-lit environments.
            *   **🌙 Obsidian Dark**: Deep slate-gray aesthetic designed for late-night workflows.
            *   **🍃 Sage Forest**: Nature-inspired organic green-accent theme.
            *   **🌌 Cosmic Night**: Deep indigo glassmorphic theme.
            *   **Instant Switcher**: Reactive local storage state changes the layout instantly without reloading.
            
            ### 🩺 3. Multi-Document Support & Simulation Spec
            *   **Medical Case Files (HIPAA)**: Clinical intake logs with protected health information.
            *   **Privacy Pack (GDPR)**: Contractual processing and auditing agreements.
            *   **Business Invoices**: Full ledger sheets with billing descriptions.
            *   **Government ID Cards**: Driver licenses and credential cards.
            *   **Sales Receipts**: Grocery invoices with subtotal ledgers.
            *   **Handwritten Notes**: Blue ink cursive layouts for brainstorming.
            *   **Shipping Labels**: High-contrast layout with scannable barcode structures.
            
            ### ⚖️ 4. Local Encryption & Auditing Logs
            *   **AES-GCM Local Encryption**: Secures confidential text in private folders with a folder passkey pin.
            *   **Live Compliance Audit Trail**: Live in-memory logging of all actions (CREATE, READ, UPDATE, DELETE, EXPORT, SYNC, DECRYPT) for HIPAA/GDPR validation.
            *   **Dual Cloud Syncer**: Encrypted Cloudflare R2 object storage backup and sync parameters.
            
            ---
            
            ## 📦 Release Artifacts Included
            - **`DocuScan_${{ github.ref_name }}_Debug.apk`**: Pre-signed testing application (ideal for quick local device evaluation).
            - **`DocuScan_${{ github.ref_name }}_Release_Unsigned.apk`**: Production release package (ready for custom signing keys).
            
            *Designed with modern Jetpack Compose, Material Design 3, and Room SQLite persistence.*
