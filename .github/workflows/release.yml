name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

jobs:
  release:
    name: Build & Publish Signed Release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for changelog generation

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 9.1.0 --distribution-type bin
          fi

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set. Cannot sign release."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release-keystore.p12"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release-keystore.p12" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Build signed release AAB (Play Store)
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --stacktrace

      - name: Collect artifacts
        id: artifacts
        run: |
          set -e
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          mkdir -p dist
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          AAB=$(find app/build/outputs/bundle/release -name "*.aab" | head -n1)
          [ -n "$APK" ] && cp "$APK" "dist/DocuScan-${VERSION}.apk"
          [ -n "$AAB" ] && cp "$AAB" "dist/DocuScan-${VERSION}.aab"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          ( cd dist && sha256sum * > SHA256SUMS.txt )
          ls -la dist

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "## Changelog" > CHANGELOG_RELEASE.md
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:'- %s (%h)' "$PREV_TAG"..HEAD >> CHANGELOG_RELEASE.md
          else
            git log --pretty=format:'- %s (%h)' >> CHANGELOG_RELEASE.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifacts.outputs.version }}
          name: "DocuScan OCR ${{ steps.artifacts.outputs.version }}"
          draft: false
          prerelease: ${{ contains(steps.artifacts.outputs.version, '-rc') || contains(steps.artifacts.outputs.version, '-beta') }}
          body_path: CHANGELOG_RELEASE.md
          files: |
            dist/*.apk
            dist/*.aab
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
