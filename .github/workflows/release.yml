name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v2.0.0)"
        required: true

permissions:
  contents: write

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

jobs:
  release:
    name: Build APK & Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Ensure wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 9.5.0 --distribution-type bin
          fi

      - name: Ensure keystore exists
        run: |
          KS=app/upload-keystore.p12
          if [ ! -f "$KS" ]; then
            echo "No committed keystore found — generating one from app/keystore.properties"
            source <(grep -v '^#' app/keystore.properties | sed 's/=/="/; s/$/"/')
            keytool -genkeypair -v -storetype PKCS12 \
              -keystore "$KS" -alias "$keyAlias" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$storePassword" -keypass "$keyPassword" \
              -dname "CN=DocuScan OCR, O=DocuScan OCR, C=IN"
          else
            echo "Using committed keystore: $KS"
          fi

      - name: Build signed APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Collect APK
        id: artifacts
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          mkdir -p dist
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          cp "$APK" "dist/DocuScan-${VERSION}.apk"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          ( cd dist && sha256sum * > SHA256SUMS.txt )

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifacts.outputs.version }}
          name: "DocuScan OCR ${{ steps.artifacts.outputs.version }}"
          draft: false
          prerelease: ${{ contains(steps.artifacts.outputs.version, '-rc') || contains(steps.artifacts.outputs.version, '-beta') }}
          files: |
            dist/*.apk
            dist/SHA256SUMS.txt
