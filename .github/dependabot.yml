version: 2
updates:
  # Gradle dependencies (version catalog + build scripts)
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      androidx:
        patterns:
          - "androidx.*"
      kotlin-coroutines:
        patterns:
          - "org.jetbrains.kotlinx:kotlinx-coroutines*"
    commit-message:
      prefix: "build"
      include: scope
    labels:
      - dependencies

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - ci
